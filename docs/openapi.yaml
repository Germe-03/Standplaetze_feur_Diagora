openapi: 3.0.3
info:
  title: Diagora Booking Hub API
  version: 1.0.0
  description: HTTP-API für Buchungen, Standplätze, Kampagnen und Nutzer.
servers:
  - url: http://127.0.0.1:8091
paths:
  /api/dashboard:
    get:
      summary: Dashboarddaten laden
      parameters:
        - name: month
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Dashboarddaten
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnyObject"
  /api/meta:
    get:
      summary: Metadaten laden
      responses:
        "200":
          description: Metadaten
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetaResponse"
  /api/bookings:
    get:
      summary: Buchungen laden
      responses:
        "200":
          description: Buchungsliste
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AnyObject"
    post:
      summary: Buchung erstellen
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnyObject"
      responses:
        "201":
          description: Buchung erstellt
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnyObject"
  /api/bookings/validate-limits:
    post:
      summary: Buchungslimits validieren
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnyObject"
      responses:
        "200":
          description: Validierungsergebnis
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnyObject"
  /api/bookings/validate:
    post:
      summary: Buchung fachlich validieren
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnyObject"
      responses:
        "200":
          description: Validierungsergebnis
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnyObject"
  /api/bookings/{booking_id}:
    put:
      summary: Buchung aktualisieren
      parameters:
        - name: booking_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnyObject"
      responses:
        "200":
          description: Buchung aktualisiert
    delete:
      summary: Buchung löschen
      parameters:
        - name: booking_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Buchung gelöscht
  /api/stands:
    get:
      summary: Standplätze laden
      parameters:
        - name: month
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Standplatzliste
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AnyObject"
    post:
      summary: Standplatz erstellen
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnyObject"
      responses:
        "201":
          description: Standplatz erstellt
  /api/stands/{location_id}:
    put:
      summary: Standplatz aktualisieren
      parameters:
        - name: location_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnyObject"
      responses:
        "200":
          description: Standplatz aktualisiert
    delete:
      summary: Standplatz löschen
      parameters:
        - name: location_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Standplatz gelöscht
  /api/campaigns:
    get:
      summary: Kampagnen laden
      responses:
        "200":
          description: Kampagnenliste
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AnyObject"
    post:
      summary: Kampagne erstellen
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnyObject"
      responses:
        "201":
          description: Kampagne erstellt
  /api/campaigns/{campaign_id}:
    put:
      summary: Kampagne aktualisieren
      parameters:
        - name: campaign_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnyObject"
      responses:
        "200":
          description: Kampagne aktualisiert
    delete:
      summary: Kampagne löschen
      parameters:
        - name: campaign_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Kampagne gelöscht
  /api/users:
    get:
      summary: Nutzer laden
      responses:
        "200":
          description: Nutzerliste
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AnyObject"
    post:
      summary: Nutzer erstellen
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnyObject"
      responses:
        "201":
          description: Nutzer erstellt
  /api/users/{user_id}:
    put:
      summary: Nutzer aktualisieren
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnyObject"
      responses:
        "200":
          description: Nutzer aktualisiert
    delete:
      summary: Nutzer löschen
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Nutzer gelöscht
components:
  schemas:
    AnyObject:
      type: object
      additionalProperties: true
    MetaLocation:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        city:
          type: string
        price:
          type: number
          nullable: true
    MetaCampaign:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        year:
          type: integer
        budget:
          type: number
        user_id:
          type: integer
        is_active:
          type: boolean
    MetaCity:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
    MetaUser:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        first_name:
          type: string
        last_name:
          type: string
        role:
          type: string
        is_active:
          type: boolean
        email:
          type: string
        address:
          type: string
    MetaResponse:
      type: object
      properties:
        locations:
          type: array
          items:
            $ref: "#/components/schemas/MetaLocation"
        campaigns:
          type: array
          items:
            $ref: "#/components/schemas/MetaCampaign"
        cities:
          type: array
          items:
            $ref: "#/components/schemas/MetaCity"
        users:
          type: array
          items:
            $ref: "#/components/schemas/MetaUser"
        next_booking_id:
          type: integer
        next_stand_id:
          type: integer
